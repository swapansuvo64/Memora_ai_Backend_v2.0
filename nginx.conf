worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Set client upload limit to 50MB to accommodate high-resolution images
    client_max_body_size 50M;

    server {
        listen 8000;
        server_name localhost;

        # Disable access log for health checks, enable error log
        error_log /var/log/nginx/error.log warn;

        # Add CORS Headers (Global Config)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Handle Preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # 1. AUTH SERVICE ROUTING
        location /api/v1/auth {
            proxy_pass http://auth-service:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. USER SERVICE ROUTING
        location /api/v1/gallery {
            proxy_pass http://user-service:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. AGENT SERVICE ROUTING
        location /api/v1/agent {
            proxy_pass http://agent-service:8003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Healthcheck endpoint
        location /health {
            default_type application/json;
            return 200 '{"status":"healthy","service":"gateway"}';
        }
    }
}
